<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars Before The Drones | Tracy Kyaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", Arial, sans-serif;
      background: #132941;
      color: #f1f4f9;
      padding: 30px 14px 42px;
    }

    .comic-wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .comic-header {
      margin-bottom: 20px;
    }

    .comic-header a {
      color: #f2d74a;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.05rem;
    }

    .comic-header h1 {
      font-family: "Playfair Display", serif;
      margin-top: 8px;
      font-size: clamp(1.9rem, 3vw, 2.5rem);
      color: #f6f3e7;
    }

    .comic-pages {
      display: grid;
      gap: 14px;
    }

    .comic-pages img {
      width: 100%;
      border-radius: 6px;
      display: block;
      border: 1px solid rgba(241, 244, 249, 0.16);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
    }
  </style>
</head>
<body>
  <main class="comic-wrap">
    <header class="comic-header">
      <a href="./#work">&#8592; Back to portfolio</a>
      <h1>Stars Before The Drones</h1>
    </header>

    <section class="comic-pages" aria-label="Comic pages">
      <img src="comics/stars-before-drones/01.png" alt="Stars Before The Drones page 1">
      <img src="comics/stars-before-drones/02.png" alt="Stars Before The Drones page 2">
      <img src="comics/stars-before-drones/03.png" alt="Stars Before The Drones page 3">
      <img src="comics/stars-before-drones/04.png" alt="Stars Before The Drones page 4">
      <img src="comics/stars-before-drones/05.png" alt="Stars Before The Drones page 5">
      <img src="comics/stars-before-drones/06.png" alt="Stars Before The Drones page 6">
      <img src="comics/stars-before-drones/07.png" alt="Stars Before The Drones page 7">
      <img src="comics/stars-before-drones/08.png" alt="Stars Before The Drones page 8">
    </section>
  </main>
</body>
</html>
