<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tobi | Tracy Kyaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", Arial, sans-serif;
      background: #221e34;
      color: #f7f2df;
      padding: 30px 14px 42px;
    }

    .comic-wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .comic-header {
      margin-bottom: 20px;
    }

    .comic-header a {
      color: #f2d74a;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.05rem;
    }

    .comic-header h1 {
      font-family: "Playfair Display", serif;
      margin-top: 8px;
      font-size: clamp(1.9rem, 3vw, 2.5rem);
      color: #f6f3e7;
    }

    .comic-viewer {
      display: grid;
      gap: 14px;
    }

    .comic-page {
      width: 100%;
      border-radius: 6px;
      display: block;
      border: 1px solid rgba(241, 244, 249, 0.16);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.24);
    }

    .comic-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .comic-controls button {
      font-family: "DM Sans", Arial, sans-serif;
      border: 1px solid rgba(242, 215, 74, 0.5);
      background: rgba(242, 215, 74, 0.16);
      color: #f6f3e7;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    .comic-controls button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .page-counter {
      color: #d4deee;
      font-size: 0.92rem;
      letter-spacing: 0.04rem;
    }
  </style>
</head>
<body>
  <main class="comic-wrap">
    <header class="comic-header">
      <a href="./comics.html#work">&#8592; Back to comics</a>
      <h1>Tobi</h1>
    </header>

    <section class="comic-viewer" aria-label="Comic pages">
      <img id="comic-page" class="comic-page" src="comics/closet-story/01.png" alt="Tobi comic page 1">
      <div class="comic-controls">
        <button id="prev-page" type="button">◀ Previous</button>
        <p id="page-counter" class="page-counter">Page 1 of 5</p>
        <button id="next-page" type="button">Next ▶</button>
      </div>
    </section>
  </main>
  <script>
    (function () {
      var pages = [
        "comics/closet-story/01.png",
        "comics/closet-story/02.png",
        "comics/closet-story/03.png",
        "comics/closet-story/04.png",
        "comics/closet-story/05.png"
      ];
      var pageImage = document.getElementById("comic-page");
      var counter = document.getElementById("page-counter");
      var prevButton = document.getElementById("prev-page");
      var nextButton = document.getElementById("next-page");
      var pageIndex = 0;

      function renderPage() {
        var pageNumber = pageIndex + 1;
        pageImage.src = pages[pageIndex];
        pageImage.alt = "Tobi comic page " + pageNumber;
        counter.textContent = "Page " + pageNumber + " of " + pages.length;
        prevButton.disabled = pageIndex === 0;
        nextButton.disabled = pageIndex === pages.length - 1;
      }

      prevButton.addEventListener("click", function () {
        if (pageIndex > 0) {
          pageIndex -= 1;
          renderPage();
        }
      });

      nextButton.addEventListener("click", function () {
        if (pageIndex < pages.length - 1) {
          pageIndex += 1;
          renderPage();
        }
      });

      window.addEventListener("keydown", function (event) {
        if (event.key === "ArrowLeft") prevButton.click();
        if (event.key === "ArrowRight") nextButton.click();
      });

      renderPage();
    })();
  </script>
</body>
</html>
